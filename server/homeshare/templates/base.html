<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Homeshare{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <header>
      <a href="{{ url_for('web.index') }}">Homeshare</a>
      {% if user %} - signed in as {{ user.name or user.email or user.sub }}
      &nbsp;<a href="{{ url_for('web.account') }}">Account</a> &nbsp;
      <form
        method="POST"
        action="{{ url_for('auth.logout') }}"
        style="display: inline"
      >
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <button
          type="submit"
          style="
            background: none;
            border: none;
            padding: 0;
            color: inherit;
            text-decoration: underline;
            cursor: pointer;
            font: inherit;
          "
        >
          Sign out
        </button>
      </form>
      {% else %} &nbsp;<a href="{{ url_for('auth.login') }}">Sign in</a>
      {% endif %}
    </header>
    <hr />
    {% block content %}{% endblock %}
    <hr />
    <footer>
      Powered by <a href="{{ repo_url }}">HomeShare</a>, licensed under the
      <a href="https://spdx.org/licenses/AGPL-3.0-or-later.html"
        >AGPL-3.0-or-later</a
      >
    </footer>
    <script src="{{ url_for('static', filename='time.js') }}"></script>
  </body>
</html>
