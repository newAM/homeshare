<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Homeshare{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <header>
      <a class="brand" href="{{ url_for('web.index') }}">Homeshare</a>
      {% if user %}
      <nav class="header-nav">
        <a href="{{ url_for('web.account') }}">Account</a>
        <form method="POST" action="{{ url_for('auth.logout') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          <button type="submit" class="btn-link">Sign out</button>
        </form>
      </nav>
      {% else %}
      <nav class="header-nav">
        <a href="{{ url_for('auth.login') }}">Sign in</a>
      </nav>
      {% endif %}
    </header>
    <hr />
    {% block content %}{% endblock %}
    <hr />
    <footer>
      Powered by <a href="{{ repo_url }}">HomeShare</a>, licensed under the
      <a href="https://spdx.org/licenses/AGPL-3.0-or-later.html"
        >AGPL-3.0-or-later</a
      >
    </footer>
    <script src="{{ url_for('static', filename='time.js') }}"></script>
  </body>
</html>
